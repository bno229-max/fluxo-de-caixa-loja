<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa - Controle Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-negative-row { background-color: #fff1f2 !important; border-left: 4px solid #f43f5e; }
        input, select { transition: all 0.2s; }
        input:focus, select:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .filter-chip { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #64748b; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Fluxo de Caixa</h1>
                <p class="text-slate-500 font-medium text-lg text-indigo-600/80">Controle e previsibilidade real</p>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Período:</span>
                    <input type="date" id="filterStart" class="text-xs p-2 border border-slate-200 rounded-lg outline-none">
                    <span class="text-slate-300">até</span>
                    <input type="date" id="filterEnd" class="text-xs p-2 border border-slate-200 rounded-lg outline-none">
                </div>
                <button onclick="clearFilters()" class="text-[10px] font-bold text-indigo-600 hover:underline uppercase">Limpar Filtros</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-5 mb-10">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">Receitas (Confirmadas)</p>
                <h2 id="totalReceita" class="text-2xl font-bold text-emerald-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">Despesas (Pagas)</p>
                <h2 id="totalDespesa" class="text-2xl font-bold text-rose-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 ring-1 ring-amber-100">
                <p class="text-[11px] text-amber-600 font-bold uppercase tracking-wider mb-2">Total Pendente</p>
                <h2 id="totalPendente" class="text-2xl font-bold text-amber-600">R$ 0,00</h2>
            </div>
            <div class="bg-indigo-600 p-5 rounded-2xl shadow-lg shadow-indigo-100 text-white">
                <p class="text-[11px] text-indigo-200 font-bold uppercase tracking-wider mb-2">Saldo Real Líquido</p>
                <h2 id="saldoLiquido" class="text-2xl font-bold">R$ 0,00</h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl shadow-sm text-white border-b-4 border-emerald-500">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Média Rec/Dia</p>
                <h2 id="avgReceita" class="text-xl font-bold text-emerald-400">R$ 0,00</h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl shadow-sm text-white border-b-4 border-rose-500">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Média Desp/Dia</p>
                <h2 id="avgDespesa" class="text-xl font-bold text-rose-400">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 bg-white p-8 rounded-2xl shadow-sm border border-slate-200 h-fit sticky top-10">
                <h3 id="formTitle" class="text-xl font-bold mb-6 text-slate-800">Lançamentos</h3>
                <form id="cashFlowForm" class="space-y-5">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Data de Vencimento</label>
                        <input type="date" id="date" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Descrição</label>
                        <input type="text" id="description" placeholder="Ex: Boleto Aluguel..." required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Valor (R$)</label>
                        <input type="number" id="value" step="0.01" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-lg">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Tipo</label>
                            <select id="type" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm">
                                <option value="receita">RECEITA</option>
                                <option value="despesa">DESPESA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Status</label>
                            <select id="status" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                                <option value="pendente">Pendente</option>
                                <option value="confirmado">Confirmado</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1.5 uppercase text-slate-500 tracking-wide">Categoria</label>
                        <select id="category" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                            <option value="Boleto">Boleto</option>
                            <option value="Custo Fixo">Custo Fixo</option>
                            <option value="Outras Receitas">Outras Receitas</option>
                            <option value="Outras Despesas">Outras Despesas</option>
                        </select>
                    </div>
                    <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">Salvar Lançamento</button>
                    <button type="button" id="btnCancel" class="hidden w-full bg-slate-100 text-slate-600 font-bold py-2 rounded-xl mt-2 text-sm text-center">Cancelar Edição</button>
                </form>
            </div>

            <div class="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-fit">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-400 border-b border-slate-100">
                            <tr>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest">Vencimento</th>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest">Descrição</th>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest text-right">Valor</th>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest text-center">Status</th>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest text-right">Acumulado</th>
                                <th class="p-5 text-[10px] uppercase font-extrabold tracking-widest text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('fluxo_caixa_data')) || [];
        
        // Elementos de Filtro
        const filterStart = document.getElementById('filterStart');
        const filterEnd = document.getElementById('filterEnd');

        // Setar datas padrão do mês atual para o filtro ao carregar
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
        filterStart.value = firstDay;
        filterEnd.value = lastDay;

        [filterStart, filterEnd].forEach(el => el.addEventListener('change', render));

        function clearFilters() {
            filterStart.value = '';
            filterEnd.value = '';
            render();
        }

        const form = document.getElementById('cashFlowForm');
        const tableBody = document.getElementById('tableBody');

        form.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const entry = {
                id: id ? parseFloat(id) : Date.now(),
                date: document.getElementById('date').value,
                description: document.getElementById('description').value,
                value: parseFloat(document.getElementById('value').value),
                type: document.getElementById('type').value,
                status: document.getElementById('status').value,
                category: document.getElementById('category').value
            };

            if (id) {
                entries = entries.map(en => en.id === entry.id ? entry : en);
            } else {
                entries.push(entry);
            }
            
            saveData();
            resetForm();
            render();
        };

        function saveData() {
            localStorage.setItem('fluxo_caixa_data', JSON.stringify(entries));
        }

        function render() {
            // Filtragem Global
            const start = filterStart.value;
            const end = filterEnd.value;

            const filteredEntries = entries.filter(en => {
                if (start && en.date < start) return false;
                if (end && en.date > end) return false;
                return true;
            });

            filteredEntries.sort((a, b) => new Date(a.date) - new Date(b.date));

            // Para o cálculo da média, usamos o intervalo do filtro ou os dias do mês
            let daysInInterval;
            if (start && end) {
                const diffTime = Math.abs(new Date(end) - new Date(start));
                daysInInterval = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            } else {
                daysInInterval = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            }

            let runningBalance = 0;
            let totalRecConfirmada = 0;
            let totalDespConfirmada = 0;
            let totalPendente = 0;
            
            tableBody.innerHTML = '';

            filteredEntries.forEach(en => {
                const impact = en.type === 'receita' ? en.value : -en.value;
                runningBalance += impact;

                if (en.status === 'confirmado') {
                    if (en.type === 'receita') totalRecConfirmada += en.value;
                    else totalDespConfirmada += en.value;
                } else {
                    totalPendente += impact;
                }

                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-colors duration-200";
                if (runningBalance < 0) row.classList.add('bg-negative-row');
                
                const statusBtn = en.status === 'pendente' 
                    ? `<button onclick="toggleStatus(${en.id})" class="text-[10px] bg-amber-50 text-amber-600 border border-amber-200 px-3 py-1 rounded-full font-bold uppercase hover:bg-amber-100 transition-all">Pendente</button>`
                    : `<span class="text-[10px] bg-emerald-50 text-emerald-600 border border-emerald-100 px-3 py-1 rounded-full font-bold uppercase">Confirmado</span>`;

                row.innerHTML = `
                    <td class="p-5 text-sm text-slate-500 font-medium">${new Date(en.date).toLocaleDateString('pt-BR', {timeZone: 'UTC'})}</td>
                    <td class="p-5">
                        <div class="font-bold text-slate-800 text-sm leading-tight">${en.description}</div>
                        <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-tight">${en.category}</div>
                    </td>
                    <td class="p-5 text-right font-bold text-sm ${en.type === 'receita' ? 'text-emerald-600' : 'text-rose-600'}">
                        ${en.type === 'receita' ? '+' : '-'} ${formatMoney(en.value)}
                    </td>
                    <td class="p-5 text-center">${statusBtn}</td>
                    <td class="p-5 text-right font-bold text-slate-700 text-sm">${formatMoney(runningBalance)}</td>
                    <td class="p-5 text-center flex justify-center gap-4">
                        <button onclick="editEntry(${en.id})" class="text-indigo-600 font-bold text-xs hover:scale-110 transition-transform italic">Editar</button>
                        <button onclick="deleteEntry(${en.id})" class="text-rose-400 font-bold text-xs hover:scale-110 transition-transform">Excluir</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            // Atualização dos Cards Dinâmicos
            document.getElementById('totalReceita').innerText = formatMoney(totalRecConfirmada);
            document.getElementById('totalDespesa').innerText = formatMoney(totalDespConfirmada);
            document.getElementById('totalPendente').innerText = formatMoney(totalPendente);
            document.getElementById('saldoLiquido').innerText = formatMoney(totalRecConfirmada - totalDespConfirmada);
            document.getElementById('avgReceita').innerText = formatMoney(totalRecConfirmada / daysInInterval);
            document.getElementById('avgDespesa').innerText = formatMoney(totalDespConfirmada / daysInInterval);
        }

        window.toggleStatus = (id) => {
            const en = entries.find(e => e.id === id);
            en.status = 'confirmado';
            saveData();
            render();
        };

        function formatMoney(v) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        window.deleteEntry = (id) => {
            if(confirm("Confirmar exclusão permanente?")) {
                entries = entries.filter(en => en.id !== id);
                saveData();
                render();
            }
        };

        window.editEntry = (id) => {
            const en = entries.find(e => e.id === id);
            document.getElementById('editId').value = en.id;
            document.getElementById('date').value = en.date;
            document.getElementById('description').value = en.description;
            document.getElementById('value').value = en.value;
            document.getElementById('type').value = en.type;
            document.getElementById('status').value = en.status;
            document.getElementById('category').value = en.category;
            document.getElementById('formTitle').innerText = "✏️ Editando...";
            document.getElementById('btnSubmit').innerText = "Atualizar";
            document.getElementById('btnCancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function resetForm() {
            form.reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').innerText = "Lançamentos";
            document.getElementById('btnSubmit').innerText = "Salvar Lançamento";
            document.getElementById('btnCancel').classList.add('hidden');
        }

        document.getElementById('btnCancel').onclick = resetForm;

        // Inicialização
        render();
    </script>
</body>
</html>
